<style>
  :root {
    --bg: #140F26; --surface: #1E1832; --surface-2: rgba(255,255,255,0.05);
    --text: #FAF7F2; --text-dim: #948FB0; --line: rgba(255,255,255,0.1);
    --twilight: #5C3DF5; --aurora: #7A63F8; --ember: #FF7A59; --ember-2: #FF9E6B;
  }
  body.light {
    --bg: #FAF7F2; --surface: #FFFFFF; --surface-2: #F4F1EA;
    --text: #1C1730; --text-dim: #756F92; --line: rgba(28,23,48,0.1);
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; transition:background .25s,color .25s; min-height:100vh; }
  .display { font-family:'Fraunces', Georgia, serif; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 26px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:20; flex-wrap:wrap; gap:8px; }
  .topbar .brand { display:flex; align-items:center; gap:9px; font-family:'Fraunces',serif; font-weight:600; font-size:18px; }
  .topbar .brand svg { width:26px; height:26px; }
  .topbar .right { display:flex; align-items:center; gap:12px; }
  .topbar a.back { font-size:13px; color:var(--text-dim); text-decoration:none; }
  .topbar a.back:hover { color:var(--text); }

  .langsel { display:flex; gap:2px; border:1px solid var(--line); border-radius:20px; padding:3px; }
  .langsel button { border:none; background:none; color:var(--text-dim); font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:16px; cursor:pointer; }
  .langsel button.active { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }

  .toggle { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); border:1px solid var(--line); border-radius:20px; padding:6px 6px 6px 14px; cursor:pointer; user-select:none; }
  .toggle .knob { width:34px; height:20px; border-radius:12px; background:var(--surface-2); position:relative; border:1px solid var(--line); }
  .toggle .knob::after { content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:linear-gradient(120deg,var(--twilight),var(--ember)); top:2px; left:2px; transition:left .2s; }
  body.light .toggle .knob::after { left:17px; }

  .layout { display:flex; max-width:1300px; margin:0 auto; }
  aside.sidebar { width:260px; flex-shrink:0; padding:26px 18px; position:sticky; top:61px; height:calc(100vh - 61px); overflow-y:auto; }
  aside.sidebar h4 { font-size:11px; text-transform:uppercase; letter-spacing:.1em; color:var(--ember-2); margin:22px 0 8px; padding-left:10px; }
  aside.sidebar h4:first-child { margin-top:4px; }
  .s-item { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:10px; font-size:13.5px; color:var(--text-dim); cursor:pointer; margin-bottom:2px; }
  .s-item .idx { width:20px; height:20px; border-radius:6px; background:var(--surface-2); color:var(--text-dim); font-size:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-weight:700; }
  .s-item:hover { background:var(--surface-2); color:var(--text); }
  .s-item.active { background:linear-gradient(120deg, rgba(92,61,245,.18), rgba(255,122,89,.14)); color:var(--text); }
  .s-item.active .idx { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }

  main.viewer { flex:1; display:flex; flex-direction:column; align-items:center; padding:50px 24px 100px; }
  .viewer-head { text-align:center; margin-bottom:30px; max-width:480px; }
  .viewer-head .eyebrow { font-size:11.5px; text-transform:uppercase; letter-spacing:.1em; color:var(--ember-2); font-weight:700; }
  .viewer-head h2 { font-size:26px; font-weight:600; margin:8px 0 6px; }
  .viewer-head p { font-size:14px; color:var(--text-dim); line-height:1.5; }

  .phone { width:340px; height:700px; border-radius:42px; background:var(--surface); border:1px solid var(--line); box-shadow:0 40px 80px -30px rgba(0,0,0,.5); padding:20px 18px; display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden; }
  .phone::before { content:""; position:absolute; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle, rgba(255,122,89,.16), transparent 70%); top:-100px; right:-70px; pointer-events:none; }
  .notch { width:54px; height:5px; border-radius:3px; background:var(--line); margin:0 auto 4px; }

  .s-label { font-size:11.5px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); }
  .headline { font-family:'Fraunces',serif; font-size:21px; font-weight:600; line-height:1.2; }
  .card { background:var(--surface-2); border:1px solid var(--line); border-radius:16px; padding:12px 14px; font-size:12.5px; }
  .thumb { border-radius:14px; background:linear-gradient(135deg, rgba(122,99,248,.4), rgba(255,122,89,.35)); display:flex; align-items:center; justify-content:center; font-size:11px; color:white; text-align:center; padding:8px; }
  .btn { border-radius:30px; text-align:center; font-size:13px; font-weight:700; padding:13px 10px; }
  .btn.primary { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }
  .btn.ghost { border:1.4px solid var(--line); color:var(--text); }
  .row { display:flex; gap:9px; }
  .row > * { flex:1; }
  .tag { font-size:10.5px; padding:5px 11px; border-radius:10px; border:1px solid var(--line); color:var(--text-dim); }
  .tag.on { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; border:none; }
  .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--aurora),var(--ember)); flex-shrink:0; }
  .top-row { display:flex; align-items:center; justify-content:space-between; }
  .top-row .brand-mini { display:flex; align-items:center; gap:7px; font-weight:700; font-size:14px; font-family:'Fraunces',serif; }
  .top-row .brand-mini svg { width:22px; height:22px; }
  .icon-dot { width:28px; height:28px; border-radius:50%; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:12px; }

  .tabbar { margin-top:auto; display:flex; justify-content:space-around; padding-top:12px; border-top:1px solid var(--line); }
  .tabbar .dot { width:18px; height:18px; border-radius:6px; background:var(--surface-2); }
  .tabbar .dot.active { background:linear-gradient(120deg,var(--twilight),var(--ember)); }

  .occasion-card {
    border-radius: 14px; height: 84px; position: relative; overflow: hidden;
    background-size: cover; background-position: center; display: flex; align-items: flex-end;
  }
  .occasion-card .scrim {
    width: 100%; padding: 8px 10px 7px; background: linear-gradient(0deg, rgba(0,0,0,0.72), rgba(0,0,0,0.05) 70%);
    color: white; font-size: 11px; font-weight: 700;
  }

  .gif-box {
    border-radius: 14px; height: 90px; position: relative; overflow: hidden;
    background: linear-gradient(135deg, #241a3f, #3a2560);
  }
  .gif-box .spark {
    position: absolute; border-radius: 50%; opacity: 0;
    animation: gifpop 2.4s ease-in-out infinite;
  }
  .gif-box .badge-gif {
    position: absolute; top: 6px; right: 7px; font-size: 8.5px; font-weight: 800; letter-spacing: 0.05em;
    background: rgba(0,0,0,0.4); color: white; padding: 2px 6px; border-radius: 6px;
  }
  .gif-box .lbl {
    position: absolute; bottom: 7px; left: 10px; font-size: 10px; color: rgba(255,255,255,0.85);
  }
  @keyframes gifpop {
    0% { transform: translateY(10px) scale(0.4); opacity: 0; }
    35% { opacity: 1; }
    70% { transform: translateY(-26px) scale(1); opacity: 0.9; }
    100% { transform: translateY(-34px) scale(1.15); opacity: 0; }
  }

  .nav-controls { display:flex; align-items:center; gap:18px; margin-top:30px; }
  .nav-btn { width:42px; height:42px; border-radius:50%; border:1px solid var(--line); background:var(--surface); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:var(--text); }
  .nav-btn:hover { border-color:var(--ember); }
  .nav-pos { font-size:12.5px; color:var(--text-dim); min-width:60px; text-align:center; }

  @media (max-width: 860px) {
    aside.sidebar { display:none; }
    .phone { width:100%; max-width:340px; height:auto; min-height:600px; }
    .langsel button { padding:6px 7px; font-size:10.5px; }
  }
  @media (max-width: 640px) {
    .topbar { padding:12px 14px; }
    .topbar .brand { font-size:16px; }
    .topbar .right { gap:6px; }
    main.viewer { padding:26px 12px 80px; }
    .viewer-head h2 { font-size:21px; }
  }
</style>

var current = 0;

function renderLangSel() {
  var html = LANGS.map(function(l) {
    return '<button class="' + (lang===l.code?'active':'') + '" data-l="' + l.code + '">' + l.label + '</button>';
  }).join('');
  document.getElementById('langsel').innerHTML = html;
  var btns = document.querySelectorAll('.langsel button');
  for (var i=0;i<btns.length;i++) {
    btns[i].addEventListener('click', function() { lang = this.dataset.l; renderAll(); });
  }
}

function renderSidebar() {
  var sidebar = document.getElementById('sidebar');
  var html = '';
  var lastGroup = null;
  for (var i=0;i<SCREENS.length;i++) {
    var s = SCREENS[i];
    if (s.g !== lastGroup) { html += '<h4>' + t('group'+s.g) + '</h4>'; lastGroup = s.g; }
    html += '<div class="s-item' + (i===current?' active':'') + '" data-i="' + i + '"><div class="idx">' + (i+1) + '</div>' + t('title'+(i+1)) + '</div>';
  }
  sidebar.innerHTML = html;
  var items = sidebar.querySelectorAll('.s-item');
  for (var j=0;j<items.length;j++) {
    items[j].addEventListener('click', function() { current = parseInt(this.dataset.i); renderAll(); });
  }
}

function renderAll() {
  document.documentElement.lang = lang;
  document.getElementById('brandSub').textContent = t('brandSub');
  document.getElementById('backLink').textContent = t('back');
  document.getElementById('themeLabel').textContent = document.body.classList.contains('light') ? t('theme_light') : t('theme_dark');
  var i = current + 1;
  document.getElementById('phone').innerHTML = SCREENS[current].html();
  document.getElementById('vGroup').textContent = t('group'+SCREENS[current].g);
  document.getElementById('vTitle').textContent = t('title'+i);
  document.getElementById('vDesc').textContent = t('desc'+i);
  document.getElementById('navPos').textContent = i + ' / ' + SCREENS.length;
  renderLangSel();
  renderSidebar();
}

document.getElementById('prevBtn').addEventListener('click', function() { current = (current - 1 + SCREENS.length) % SCREENS.length; renderAll(); });
document.getElementById('nextBtn').addEventListener('click', function() { current = (current + 1) % SCREENS.length; renderAll(); });
document.getElementById('themeToggle').addEventListener('click', function() {
  document.body.classList.toggle('light');
  renderAll();
});

renderAll();
</script>
