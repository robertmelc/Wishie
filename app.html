<style>
  :root {
    --bg: #140F26; --surface: #1E1832; --surface-2: rgba(255,255,255,0.05);
    --text: #FAF7F2; --text-dim: #948FB0; --line: rgba(255,255,255,0.1);
    --twilight: #5C3DF5; --aurora: #7A63F8; --ember: #FF7A59; --ember-2: #FF9E6B;
    --ok: #59D68F;
  }
  body.light {
    --bg: #FAF7F2; --surface: #FFFFFF; --surface-2: #F4F1EA;
    --text: #1C1730; --text-dim: #756F92; --line: rgba(28,23,48,0.1);
  }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--text); font-family:'Manrope',sans-serif; min-height:100vh; }
  .display { font-family:'Fraunces', Georgia, serif; }
  button, input, textarea { font-family:'Manrope',sans-serif; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:16px 26px; border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--bg); z-index:30; flex-wrap:wrap; gap:10px; }
  .topbar .brand { display:flex; align-items:center; gap:9px; font-family:'Fraunces',serif; font-weight:600; font-size:18px; }
  .topbar .brand svg { width:26px; height:26px; }
  .topbar .right { display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
  .topbar a.back { font-size:13px; color:var(--text-dim); text-decoration:none; }
  .topbar a.back:hover { color:var(--text); }
  .ghostbtn { font-size:12px; color:var(--text-dim); border:1px solid var(--line); border-radius:20px; padding:7px 14px; cursor:pointer; background:none; }
  .ghostbtn:hover { color:var(--text); border-color:var(--ember); }
  .langsel { display:flex; gap:2px; border:1px solid var(--line); border-radius:20px; padding:3px; }
  .langsel button { border:none; background:none; color:var(--text-dim); font-size:11.5px; font-weight:700; padding:6px 10px; border-radius:16px; cursor:pointer; }
  .langsel button.active { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }
  .toggle { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-dim); border:1px solid var(--line); border-radius:20px; padding:6px 6px 6px 14px; cursor:pointer; }
  .toggle .knob { width:34px; height:20px; border-radius:12px; background:var(--surface-2); position:relative; border:1px solid var(--line); }
  .toggle .knob::after { content:""; position:absolute; width:14px; height:14px; border-radius:50%; background:linear-gradient(120deg,var(--twilight),var(--ember)); top:2px; left:2px; transition:left .2s; }
  body.light .toggle .knob::after { left:17px; }

  .banner { max-width:900px; margin:18px auto 0; padding:11px 18px; border-radius:14px; background:linear-gradient(120deg, rgba(92,61,245,0.16), rgba(255,122,89,0.13)); border:1px solid rgba(255,122,89,0.28); font-size:12.5px; color:var(--text-dim); text-align:center; }
  .banner b { color:var(--ember-2); }

  main.viewer { display:flex; flex-direction:column; align-items:center; padding:30px 16px 100px; }
  .phone { width:360px; max-width:100%; min-height:720px; border-radius:42px; background:var(--surface); border:1px solid var(--line); box-shadow:0 40px 80px -30px rgba(0,0,0,0.5); padding:22px 20px; display:flex; flex-direction:column; gap:12px; position:relative; overflow:hidden; }
  .phone::before { content:""; position:absolute; width:260px; height:260px; border-radius:50%; background:radial-gradient(circle, rgba(255,122,89,0.16), transparent 70%); top:-100px; right:-70px; pointer-events:none; }
  .notch { width:54px; height:5px; border-radius:3px; background:var(--line); margin:0 auto 4px; }

  .s-label { font-size:11.5px; text-transform:uppercase; letter-spacing:0.06em; color:var(--text-dim); }
  .headline { font-family:'Fraunces',serif; font-size:22px; font-weight:600; line-height:1.2; }
  .subtext { font-size:13px; color:var(--text-dim); line-height:1.5; }
  .card { background:var(--surface-2); border:1px solid var(--line); border-radius:16px; padding:12px 14px; font-size:12.5px; }
  .thumb { border-radius:14px; background:linear-gradient(135deg, rgba(122,99,248,0.4), rgba(255,122,89,0.35)); display:flex; align-items:center; justify-content:center; font-size:11px; color:white; text-align:center; padding:8px; }
  .btn { border-radius:30px; text-align:center; font-size:13px; font-weight:700; padding:13px 10px; cursor:pointer; border:none; width:100%; }
  .btn.primary { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }
  .btn.ghost { border:1.4px solid var(--line); color:var(--text); background:none; }
  .btn.small { padding:9px 10px; font-size:11.5px; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; }
  .row { display:flex; gap:9px; }
  .row > * { flex:1; }
  .tag { font-size:10.5px; padding:6px 12px; border-radius:10px; border:1px solid var(--line); color:var(--text-dim); cursor:pointer; background:none; }
  .tag.on { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; border:none; }
  .avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--aurora),var(--ember)); flex-shrink:0; }
  .top-row { display:flex; align-items:center; justify-content:space-between; }
  .top-row .brand-mini { display:flex; align-items:center; gap:7px; font-weight:700; font-size:14px; font-family:'Fraunces',serif; }
  .top-row .brand-mini svg { width:22px; height:22px; }
  input[type=text], input[type=tel], input[type=email], textarea {
    width:100%; background:var(--surface-2); border:1px solid var(--line); border-radius:14px; color:var(--text);
    padding:11px 13px; font-size:13px; resize:none;
  }
  input::placeholder, textarea::placeholder { color:var(--text-dim); }
  .field-label { font-size:11px; color:var(--text-dim); margin-bottom:5px; display:block; }
  .checkline { display:flex; gap:9px; align-items:flex-start; font-size:11.5px; color:var(--text-dim); cursor:pointer; }
  .checkline input { width:16px; height:16px; margin-top:1px; accent-color: var(--ember); }

  .steps-ind { display:flex; gap:6px; margin-bottom:2px; }
  .steps-ind div { height:3px; flex:1; border-radius:2px; background:var(--surface-2); }
  .steps-ind div.done { background:linear-gradient(120deg,var(--twilight),var(--ember)); }

  .list-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--line); }
  .list-row:last-child { border-bottom:none; }
  .list-row .meta { flex:1; }
  .list-row .meta .t { font-size:12.5px; font-weight:700; }
  .list-row .meta .s { font-size:10.5px; color:var(--text-dim); }
  .badge { font-size:9.5px; padding:3px 9px; border-radius:8px; background:var(--surface-2); color:var(--text-dim); }
  .badge.ok { background:rgba(89,214,143,0.18); color:var(--ok); }
  .badge.win { background:linear-gradient(120deg,var(--twilight),var(--ember)); color:white; }

  .tabbar { margin-top:auto; display:flex; justify-content:space-around; padding-top:12px; border-top:1px solid var(--line); }
  .tabbtn { display:flex; flex-direction:column; align-items:center; gap:3px; font-size:9.5px; color:var(--text-dim); background:none; border:none; cursor:pointer; padding:4px; }
  .tabbtn .ic { width:18px; height:18px; border-radius:6px; background:var(--surface-2); }
  .tabbtn.active { color:var(--text); }
  .tabbtn.active .ic { background:linear-gradient(120deg,var(--twilight),var(--ember)); }

  .scroll-body { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:12px; padding-right:2px; }
  .scroll-body::-webkit-scrollbar { width:4px; }
  .scroll-body::-webkit-scrollbar-thumb { background:var(--line); border-radius:4px; }

  .timeline-step { display:flex; align-items:center; gap:10px; margin-bottom:10px; }
  .timeline-step:last-child { margin-bottom:0; }
  .dotstep { width:11px; height:11px; border-radius:50%; border:1.4px solid var(--line); flex-shrink:0; }
  .dotstep.done { background:var(--ember); border-color:var(--ember); }
  .dotstep.active { background:var(--twilight); border-color:var(--twilight); }
  .timeline-step .tl-label { font-size:12px; flex:1; }
  .timeline-step.dim .tl-label { color:var(--text-dim); }

  .empty { text-align:center; padding:30px 10px; color:var(--text-dim); font-size:12.5px; }

  @media (max-width: 640px) {
    .topbar { flex-direction:column; align-items:flex-start; padding:12px 14px; gap:8px; }
    .topbar .brand { font-size:16px; }
    .topbar .right { width:100%; justify-content:space-between; gap:6px; }
    .langsel button { padding:5px 7px; font-size:10px; }
    .ghostbtn { padding:6px 9px; font-size:10.5px; }
    .topbar a.back { font-size:11px; }
    .banner { margin:14px 12px 0; font-size:11.5px; padding:10px 14px; }
  }

  .occasion-card { border-radius:14px; height:74px; position:relative; overflow:hidden; background-size:cover; background-position:center; display:flex; align-items:flex-end; cursor:pointer; }
  .occasion-card .scrim { width:100%; padding:7px 9px 6px; background:linear-gradient(0deg, rgba(0,0,0,0.72), rgba(0,0,0,0.05) 70%); color:white; font-size:10.5px; font-weight:700; }

  .gif-box { border-radius:14px; height:80px; position:relative; overflow:hidden; background:linear-gradient(135deg, #241a3f, #3a2560); }
  .gif-box .spark { position:absolute; border-radius:50%; opacity:0; animation:gifpop 2.4s ease-in-out infinite; }
  .gif-box .badge-gif { position:absolute; top:6px; right:7px; font-size:8.5px; font-weight:800; letter-spacing:0.05em; background:rgba(0,0,0,0.4); color:white; padding:2px 6px; border-radius:6px; }
  .gif-box .lbl { position:absolute; bottom:7px; left:10px; font-size:10px; color:rgba(255,255,255,0.85); }
  @keyframes gifpop {
    0% { transform: translateY(10px) scale(0.4); opacity: 0; }
    35% { opacity: 1; }
    70% { transform: translateY(-24px) scale(1); opacity: 0.9; }
    100% { transform: translateY(-32px) scale(1.15); opacity: 0; }
  }
</style>

/* ---------- state ---------- */
var STORE_KEY = 'wishie_demo_state_v1';
function defaultState() {
  return {
    wishes: [], orders: [], vouchers: [],
    corporate: { condition: null },
    draw: { entries: [], winners: [] },
  };
}
function loadState() {
  try {
    var raw = localStorage.getItem(STORE_KEY);
    if (!raw) return defaultState();
    return Object.assign(defaultState(), JSON.parse(raw));
  } catch(e) { return defaultState(); }
}
function saveState() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
var state = loadState();
var nav = { screen: 'home', params: {} };
var draft = {};

function navigateTo(screen, params) { nav = { screen: screen, params: params || {} }; render(); window.scrollTo({top:0}); }
function uid() { return Math.random().toString(36).slice(2,9); }
function money(n) { return n.toLocaleString(lang==='cs'?'cs-CZ':lang) + ' Kč'; }
function occLabel(v) { var o = OCCASIONS.filter(function(x){return x.v===v;})[0]; return o ? t(o.key) : v; }
function catLabel(c) { return t('cat_'+c) || c; }

/* ---------- shared chrome ---------- */
var BOW = '<svg viewBox="0 0 100 100" style="width:100%;height:100%;"><defs><linearGradient id="bowg" x1="8" y1="20" x2="92" y2="80" gradientUnits="userSpaceOnUse"><stop offset="0" stop-color="#7A63F8"/><stop offset="1" stop-color="#FF8A66"/></linearGradient></defs><path d="M10,50 C10,36 27,22 50,50 C27,78 10,64 10,50 Z" fill="url(#bowg)"/><path d="M90,50 C90,36 73,22 50,50 C73,78 90,64 90,50 Z" fill="url(#bowg)"/><circle cx="50" cy="50" r="7.5" fill="#FAF7F2"/></svg>';
function topRow(title) {
  return '<div class="top-row"><div class="brand-mini"><span style="width:20px;height:20px;display:inline-block;">' + BOW + '</span>' + (title||'Wishie') + '</div><div style="width:28px;height:28px;border-radius:50%;border:1px solid var(--line); display:flex;align-items:center;justify-content:center;font-size:12px;">☰</div></div>';
}
function tabbar(active) {
  var items = [
    {k:'home', label:t('tab_home')}, {k:'mine', label:t('tab_mine')}, {k:'catalog', label:t('tab_catalog')}, {k:'hall', label:t('tab_hall')}
  ];
  return '<div class="tabbar">' + items.map(function(it) {
    return '<button class="tabbtn ' + (active===it.k?'active':'') + '" onclick="navigateTo(\'' + it.k + '\')"><span class="ic"></span>' + it.label + '</button>';
  }).join('') + '</div>';
}
function steps(n, total) {
  var html = '<div class="steps-ind">';
  for (var i=0;i<total;i++) html += '<div class="' + (i<n?'done':'') + '"></div>';
  html += '</div>';
  return html;
}

/* ---------- screens ---------- */
function screenHome() {
  var count = state.wishes.length;
  return topRow() +
    '<div class="scroll-body">' +
      '<div class="s-label">' + t('home_greeting') + '</div>' +
      '<div class="headline">' + t('home_headline') + '</div>' +
      '<button class="btn primary" onclick="navigateTo(\'occasion\')">' + t('home_btn1') + '</button>' +
      '<button class="btn ghost" onclick="navigateTo(\'catalog\')">' + t('home_btn2') + '</button>' +
      '<div class="card"><div class="s-label">' + t('home_card_label') + '</div>' +
        '<div class="row" style="margin-top:8px; align-items:center;"><div class="headline" style="font-size:24px;">' + count + '</div><div style="font-size:11px; color:var(--text-dim); text-align:right; flex:2;">' + (count===1?t('home_card_one'):t('home_card_many')) + '</div></div>' +
      '</div>' +
      '<div class="card" style="font-size:11px; color:var(--text-dim);">' + t('home_corp_q') + ' <a href="#" onclick="navigateTo(\'corporate\'); return false;" style="color:var(--ember-2); font-weight:700; text-decoration:none;">' + t('home_corp_link') + '</a></div>' +
    '</div>' +
    tabbar('home');
}

function screenOccasion() {
  var tiles = OCCASIONS.map(function(o) {
    return '<div class="occasion-card" style="background-image:url(' + o.img + ')" onclick="draft.occasion=\'' + o.v + '\'; navigateTo(\'create\')"><div class="scrim">' + t(o.key) + '</div></div>';
  });
  var rows = '';
  for (var i=0;i<tiles.length;i+=2) {
    rows += '<div class="row">' + tiles[i] + (tiles[i+1]||'<div style="flex:1;"></div>') + '</div>';
  }
  return steps(1,4) +
    '<div class="s-label">' + t('occ_step') + '</div>' +
    '<div class="headline">' + t('occ_headline') + '</div>' +
    '<div class="scroll-body">' + rows + '</div>' +
    '<button class="btn ghost" onclick="navigateTo(\'home\')">' + t('occ_back') + '</button>';
}

function screenCreate() {
  draft.type = draft.type || 'card';
  var previewText = draft.message ? draft.message.slice(0,60) : t('create_preview_empty');
  var gifBox = draft.type === 'video' ? (
    '<div class="gif-box">' +
      '<div class="spark" style="left:20%; width:10px; height:10px; background:var(--ember); animation-delay:0s;"></div>' +
      '<div class="spark" style="left:38%; width:7px; height:7px; background:var(--aurora); animation-delay:0.4s;"></div>' +
      '<div class="spark" style="left:55%; width:9px; height:9px; background:var(--twilight); animation-delay:0.8s;"></div>' +
      '<div class="spark" style="left:70%; width:6px; height:6px; background:var(--ember-2); animation-delay:1.2s;"></div>' +
      '<div class="spark" style="left:85%; width:8px; height:8px; background:var(--aurora); animation-delay:0.6s;"></div>' +
      '<div class="badge-gif">GIF</div>' +
      '<div class="lbl">' + t('create_tag2') + ' — ' + t('gif_example') + '</div>' +
    '</div>'
  ) : '';
  return steps(2,4) +
    '<div class="s-label">' + t('create_step') + (draft.occasion ? ' · ' + occLabel(draft.occasion) : '') + '</div>' +
    '<div class="headline">' + t('create_headline') + '</div>' +
    '<div class="thumb" style="height:110px;">' + t('create_preview_prefix') + previewText + '“</div>' +
    '<div class="row">' +
      '<button class="tag ' + (draft.type==='card'?'on':'') + '" onclick="draft.type=\'card\'; render()">' + t('create_tag1') + '</button>' +
      '<button class="tag ' + (draft.type==='video'?'on':'') + '" onclick="draft.type=\'video\'; render()">' + t('create_tag2') + '</button>' +
      '<button class="tag ' + (draft.type==='voice'?'on':'') + '" onclick="draft.type=\'voice\'; render()">' + t('create_tag3') + '</button>' +
    '</div>' +
    gifBox +
    '<textarea rows="3" placeholder="' + t('create_placeholder') + '" oninput="draft.message=this.value">' + (draft.message||'') + '</textarea>' +
    '<button class="btn primary" ' + (!draft.occasion?'disabled':'') + ' onclick="navigateTo(\'recipient\')">' + t('create_btn') + '</button>' +
    '<button class="btn ghost" onclick="navigateTo(\'occasion\')">' + t('create_back') + '</button>';
}

function screenRecipient() {
  draft.method = draft.method || 'qr';
  var voucherOk = draft.method !== 'voucher' || (draft.voucherCode && state.vouchers.filter(function(v){return v.code===draft.voucherCode && v.status==='issued';}).length>0);
  var voucherBlock;
  if (draft.method === 'voucher') {
    voucherBlock = '<input type="text" placeholder="' + t('voucher_code_ph') + '" value="' + (draft.voucherCode||'') + '" oninput="draft.voucherCode=this.value.toUpperCase(); render()">' +
      (draft.voucherCode ? (voucherOk ? '<div style="font-size:11px;color:var(--ok);">' + t('voucher_ok') + '</div>' : '<div style="font-size:11px;color:var(--ember-2);">' + t('voucher_bad') + '</div>') : '');
  } else {
    voucherBlock = '<div class="card" style="font-size:10.5px; color:var(--text-dim);">' + t('payment_sim_note') + '</div>';
  }
  return steps(3,4) +
    '<div class="s-label">' + t('recipient_step') + '</div>' +
    '<div class="headline">' + t('recipient_headline') + '</div>' +
    '<input type="text" placeholder="' + t('recipient_name_ph') + '" value="' + (draft.recipientName||'') + '" oninput="draft.recipientName=this.value">' +
    '<input type="text" placeholder="' + t('recipient_contact_ph') + '" value="' + (draft.recipientContact||'') + '" oninput="draft.recipientContact=this.value">' +
    '<div class="s-label">' + t('recipient_pay_label') + '</div>' +
    '<div class="row">' +
      '<button class="tag ' + (draft.method==='qr'?'on':'') + '" onclick="draft.method=\'qr\'; render()">' + t('pay_qr') + '</button>' +
      '<button class="tag ' + (draft.method==='dms'?'on':'') + '" onclick="draft.method=\'dms\'; render()">' + t('pay_dms') + '</button>' +
      '<button class="tag ' + (draft.method==='gateway'?'on':'') + '" onclick="draft.method=\'gateway\'; render()">' + t('pay_gateway') + '</button>' +
      '<button class="tag ' + (draft.method==='voucher'?'on':'') + '" onclick="draft.method=\'voucher\'; render()">' + t('pay_voucher') + '</button>' +
    '</div>' +
    voucherBlock +
    '<label class="checkline"><input type="checkbox" id="consentBox" ' + (draft.consent?'checked':'') + ' onchange="draft.consent=this.checked; render()"> ' + t('recipient_consent') + '</label>' +
    '<button class="btn primary" ' + ((!draft.consent || !draft.recipientName || !voucherOk)?'disabled':'') + ' onclick="submitWish()">' + t('recipient_btn') + '</button>' +
    '<button class="btn ghost" onclick="navigateTo(\'create\')">' + t('recipient_back') + '</button>';
}

function submitWish() {
  var id = uid();
  var wish = {
    id: id, occasion: draft.occasion, type: draft.type, message: draft.message||'',
    recipientName: draft.recipientName, recipientContact: draft.recipientContact,
    method: draft.method, status: 'sent', createdAt: Date.now(), recipientConsent: false,
  };
  state.wishes.unshift(wish);
  state.draw.entries.push({ id: uid(), wishId: id, role: 'sender', name: 'Ty' });
  state.draw.entries.push({ id: uid(), wishId: id, role: 'recipient', name: draft.recipientName });
  if (draft.method === 'voucher' && draft.voucherCode) {
    var v = state.vouchers.filter(function(x){return x.code===draft.voucherCode;})[0];
    if (v) v.status = 'redeemed';
  }
  saveState();
  draft = {};
  navigateTo('confirm', { wishId: id });
}

function screenConfirm() {
  var wish = state.wishes.filter(function(w){return w.id===nav.params.wishId;})[0];
  if (!wish) return screenEmptyRedirect('home');
  return steps(4,4) +
    '<div class="thumb" style="height:110px; margin-top:6px;">✓</div>' +
    '<div class="headline" style="text-align:center;">' + t('confirm_headline') + '</div>' +
    '<div class="card" style="text-align:center; color:var(--text-dim);">Ty' + t('confirm_and') + wish.recipientName + ' ' + t('confirm_card_join') + '</div>' +
    '<button class="btn ghost" onclick="navigateTo(\'recipient-view\', {wishId:\'' + wish.id + '\'})">' + t('confirm_btn1') + '</button>' +
    '<button class="btn primary" onclick="navigateTo(\'mine\')">' + t('confirm_btn2') + '</button>';
}

function screenRecipientView() {
  var wish = state.wishes.filter(function(w){return w.id===nav.params.wishId;})[0];
  if (!wish) return screenEmptyRedirect('mine');
  return '<div class="s-label" style="text-align:center;">' + t('view_for') + ' ' + wish.recipientName + '</div>' +
    '<div class="thumb" style="height:170px;">🎉 „' + (wish.message || t('view_default_msg')) + '“</div>' +
    '<label class="checkline"><input type="checkbox" ' + (wish.recipientConsent?'checked':'') + ' onchange="toggleRecipientConsent(\'' + wish.id + '\', this.checked)"> ' + t('view_consent') + '</label>' +
    '<button class="btn primary" onclick="navigateTo(\'mine\')">' + t('view_btn') + '</button>';
}
function toggleRecipientConsent(wishId, val) {
  var wish = state.wishes.filter(function(w){return w.id===wishId;})[0];
  wish.recipientConsent = val;
  var entry = state.draw.entries.filter(function(e){return e.wishId===wishId && e.role==='recipient';})[0];
  if (entry) entry.consented = val;
  saveState();
}

function screenMine() {
  var hasWishes = state.wishes.length > 0;
  var lastWinner = state.draw.winners[state.draw.winners.length-1];
  var body;
  if (!hasWishes) {
    body = '<div class="empty">' + t('mine_empty') + '<br><button class="btn primary small" style="margin-top:12px;" onclick="navigateTo(\'occasion\')">' + t('mine_empty_btn') + '</button></div>';
  } else {
    body = state.wishes.map(function(w) {
      var statusLabel = w.status === 'sent' ? t('status_sent') : t('status_received');
      var badge = (lastWinner && lastWinner.wishId===w.id) ? '<span class="badge win">' + t('mine_win_badge') + '</span>' : '<span class="badge ok">' + w.method + '</span>';
      return '<div class="list-row"><div class="avatar"></div><div class="meta"><div class="t">' + w.recipientName + ' · ' + occLabel(w.occasion) + '</div><div class="s">' + statusLabel + (w.recipientConsent?' · ' + t('mine_consent_suffix'):'') + '</div></div>' + badge + '</div>';
    }).join('');
  }
  return topRow() +
    '<div class="headline">' + t('mine_headline') + '</div>' +
    '<div class="scroll-body">' + body +
      (hasWishes ? '<button class="btn ghost" onclick="runDraw()">' + t('mine_draw_btn') + '</button>' : '') +
      (lastWinner ? '<div class="card" style="text-align:center;">' + t('mine_winner_prefix') + ' <b>' + lastWinner.name + '</b></div>' : '') +
    '</div>' +
    tabbar('mine');
}
function runDraw() {
  if (state.draw.entries.length === 0) return;
  var consented = state.draw.entries.filter(function(e) { return e.role==='sender' || e.consented; });
  var pool = consented.length ? consented : state.draw.entries;
  var winner = pool[Math.floor(Math.random()*pool.length)];
  state.draw.winners.push(winner);
  saveState();
  render();
}

function screenCatalog() {
  draft.filter = draft.filter || 'all';
  var cats = ['all'].concat(PERSONALITIES.map(function(p){return p.category;}).filter(function(c, i, arr) { return arr.indexOf(c) === i; }));
  var list = draft.filter==='all' ? PERSONALITIES : PERSONALITIES.filter(function(p){return p.category===draft.filter;});
  return topRow() +
    '<div class="headline">' + t('catalog_headline') + '</div>' +
    '<div class="row" style="flex-wrap:wrap;">' + cats.map(function(c) {
      var label = c === 'all' ? t('cat_all') : catLabel(c);
      return '<button class="tag ' + (draft.filter===c?'on':'') + '" onclick="draft.filter=\'' + c + '\'; render()">' + label + '</button>';
    }).join('') + '</div>' +
    '<div class="scroll-body" style="display:grid; grid-template-columns:1fr 1fr; gap:9px;">' +
      list.map(function(p) { return '<div class="thumb" style="height:100px; cursor:pointer; flex-direction:column;" onclick="navigateTo(\'personality-detail\',{id:\'' + p.id + '\'})">' + p.name + '<br>' + money(p.price) + '</div>'; }).join('') +
    '</div>' +
    tabbar('catalog');
}

function screenPersonalityDetail() {
  var p = PERSONALITIES.filter(function(x){return x.id===nav.params.id;})[0];
  if (!p) return screenEmptyRedirect('catalog');
  return '<div class="thumb" style="height:170px;">portrét — ' + p.name + '</div>' +
    '<div class="headline" style="font-size:19px;">' + p.name + '</div>' +
    '<div class="s-label">' + catLabel(p.category) + ' · ' + t('detail_supports') + ' ' + p.project + '</div>' +
    '<div class="card" style="text-align:center; color:var(--text-dim);">' + p.motto + '</div>' +
    '<button class="btn primary" onclick="navigateTo(\'order-form\',{id:\'' + p.id + '\'})">' + t('detail_order_prefix') + ' ' + money(p.price) + '</button>' +
    '<button class="btn ghost" onclick="navigateTo(\'catalog\')">' + t('detail_back') + '</button>';
}

function screenOrderForm() {
  var p = PERSONALITIES.filter(function(x){return x.id===nav.params.id;})[0];
  if (!p) return screenEmptyRedirect('catalog');
  draft.length = draft.length || 60;
  return '<div class="headline">' + t('order_headline') + '</div>' +
    '<div class="s-label">' + p.name + ' · ' + money(p.price) + '</div>' +
    '<input type="text" placeholder="' + t('order_recipient_ph') + '" value="' + (draft.orderRecipient||'') + '" oninput="draft.orderRecipient=this.value">' +
    '<input type="text" placeholder="' + t('order_occasion_ph') + '" value="' + (draft.orderOccasion||'') + '" oninput="draft.orderOccasion=this.value">' +
    '<textarea rows="2" placeholder="' + t('order_info_ph') + '" oninput="draft.orderInfo=this.value">' + (draft.orderInfo||'') + '</textarea>' +
    '<div class="row"><button class="tag ' + (draft.length===30?'on':'') + '" onclick="draft.length=30; render()">30s</button><button class="tag ' + (draft.length===60?'on':'') + '" onclick="draft.length=60; render()">60s</button><button class="tag ' + (draft.length===90?'on':'') + '" onclick="draft.length=90; render()">90s</button></div>' +
    '<button class="btn primary" ' + (!draft.orderRecipient?'disabled':'') + ' onclick="submitOrder(\'' + p.id + '\')">' + t('order_btn') + '</button>' +
    '<button class="btn ghost" onclick="navigateTo(\'personality-detail\',{id:\'' + p.id + '\'})">' + t('order_back') + '</button>';
}
function submitOrder(personalityId) {
  var id = uid();
  state.orders.unshift({
    id: id, personalityId: personalityId, recipientName: draft.orderRecipient, occasion: draft.orderOccasion,
    info: draft.orderInfo||'', length: draft.length, status: 'pending', createdAt: Date.now(),
  });
  saveState();
  draft = {};
  navigateTo('order-status', { orderId: id });
}

function screenOrderStatus() {
  var o = state.orders.filter(function(x){return x.id===nav.params.orderId;})[0];
  if (!o) return screenEmptyRedirect('catalog');
  var p = PERSONALITIES.filter(function(x){return x.id===o.personalityId;})[0];
  var stageIdx = {pending:0, recorded:1, delivered:2}[o.status];
  var labels = [t('status_step1'), t('status_step2'), t('status_step3')];
  return '<div class="headline">' + t('status_headline') + '</div>' +
    '<div class="s-label">' + (p?p.name:'') + ' · ' + o.recipientName + '</div>' +
    '<div class="card">' +
      labels.map(function(l,i) { return '<div class="timeline-step ' + (i>stageIdx?'dim':'') + '"><div class="dotstep ' + (i<stageIdx?'done':i===stageIdx?'active':'') + '"></div><div class="tl-label">' + l + '</div></div>'; }).join('') +
    '</div>' +
    (o.status!=='delivered' ? '<button class="btn ghost" onclick="advanceOrder(\'' + o.id + '\')">' + t('status_advance_btn') + '</button>' : '<button class="btn primary" onclick="navigateTo(\'order-delivered\',{orderId:\'' + o.id + '\'})">' + t('status_view_video_btn') + '</button>') +
    '<button class="btn ghost" onclick="navigateTo(\'mine\')">' + t('status_back') + '</button>';
}
function advanceOrder(id) {
  var o = state.orders.filter(function(x){return x.id===id;})[0];
  if (o.status==='pending') o.status='recorded';
  else if (o.status==='recorded') o.status='delivered';
  saveState();
  render();
}

function screenOrderDelivered() {
  var o = state.orders.filter(function(x){return x.id===nav.params.orderId;})[0];
  if (!o) return screenEmptyRedirect('catalog');
  var p = PERSONALITIES.filter(function(x){return x.id===o.personalityId;})[0];
  return '<div class="thumb" style="height:190px;">▶ přehrávač videa (demo)</div>' +
    '<div class="headline" style="font-size:17px;">' + t('delivered_from') + ' ' + (p?p.name:'') + ' ' + t('delivered_here') + '</div>' +
    '<div class="row"><button class="btn ghost" onclick="alert(\'' + t('delivered_download_alert') + '\')">' + t('delivered_download') + '</button><button class="btn ghost" onclick="alert(\'' + t('delivered_share_alert') + '\')">' + t('delivered_share') + '</button></div>' +
    '<div class="card" style="text-align:center; color:var(--text-dim); font-size:11px;">' + t('delivered_impact_prefix') + ' ' + (p?money(p.price):'') + ' ' + t('delivered_impact_mid') + ' ' + (p?p.project:'') + '</div>' +
    '<button class="btn ghost" onclick="navigateTo(\'mine\')">' + t('delivered_back') + '</button>';
}

function screenHall() {
  var stats = PERSONALITIES.map(function(p) {
    var orders = state.orders.filter(function(o){return o.personalityId===p.id && o.status==='delivered';});
    return Object.assign({}, p, { count: orders.length + 3, raised: (orders.length+3)*p.price });
  });
  return topRow() +
    '<div class="headline">' + t('hall_headline') + '</div>' +
    '<div class="s-label">' + t('hall_sub') + '</div>' +
    '<div class="scroll-body" style="display:grid; grid-template-columns:1fr 1fr; gap:9px;">' +
      stats.map(function(p) { return '<div class="thumb" style="height:100px; cursor:pointer;" onclick="navigateTo(\'hall-detail\',{id:\'' + p.id + '\'})">' + p.name + '<br>' + p.count + ' ' + t('hall_wishes_suffix') + '</div>'; }).join('') +
    '</div>' +
    tabbar('hall');
}
function screenHallDetail() {
  var p = PERSONALITIES.filter(function(x){return x.id===nav.params.id;})[0];
  if (!p) return screenEmptyRedirect('hall');
  var orders = state.orders.filter(function(o){return o.personalityId===p.id && o.status==='delivered';});
  var count = orders.length + 3, raised = count*p.price;
  return '<div class="thumb" style="height:160px;">portrét + motto</div>' +
    '<div class="headline" style="font-size:17px;">' + p.motto + '</div>' +
    '<div class="card" style="color:var(--text-dim);">' + t('halldetail_supports') + ' ' + p.project + '</div>' +
    '<div class="row"><span class="tag on">' + count + ' ' + t('hall_wishes_suffix') + '</span><span class="tag on">' + money(raised) + '</span></div>' +
    '<button class="btn ghost" onclick="navigateTo(\'hall\')">' + t('halldetail_back') + '</button>';
}

function screenCorporate() {
  if (state.corporate.condition === null) state.corporate.condition = t('corp_default_condition');
  var redeemed = state.vouchers.filter(function(v){return v.status==='redeemed';}).length;
  var voucherList;
  if (state.vouchers.length===0) {
    voucherList = '<div class="empty">' + t('corp_empty') + '</div>';
  } else {
    voucherList = state.vouchers.map(function(v) {
      var statusLbl = v.status==='redeemed' ? t('corp_redeemed_suffix') : t('corp_issued_suffix');
      return '<div class="list-row"><div class="meta"><div class="t" style="font-family:monospace;">' + v.code + '</div></div><span class="badge ' + (v.status==='redeemed'?'ok':'') + '">' + statusLbl + '</span></div>';
    }).join('');
  }
  return '<div class="headline">' + t('corp_headline') + '</div>' +
    '<input type="text" value="' + state.corporate.condition + '" oninput="state.corporate.condition=this.value; saveState();">' +
    '<button class="btn primary" onclick="generateVouchers()">' + t('corp_generate_btn') + '</button>' +
    '<div class="row"><span class="tag">' + state.vouchers.length + ' ' + t('corp_issued_suffix') + '</span><span class="tag on">' + redeemed + ' ' + t('corp_redeemed_suffix') + '</span></div>' +
    '<div class="scroll-body">' + voucherList + '</div>' +
    '<button class="btn ghost" onclick="navigateTo(\'home\')">' + t('corp_back') + '</button>';
}
function generateVouchers() {
  for (var i=0;i<5;i++) {
    state.vouchers.push({ code: 'WISH-' + uid().toUpperCase(), status: 'issued' });
  }
  saveState();
  render();
}

function screenEmptyRedirect(target) {
  setTimeout(function(){navigateTo(target);}, 0);
  return '<div class="empty">…</div>';
}

/* ---------- router ---------- */
var SCREENS = {
  'home': screenHome, 'occasion': screenOccasion, 'create': screenCreate,
  'recipient': screenRecipient, 'confirm': screenConfirm, 'recipient-view': screenRecipientView,
  'mine': screenMine, 'catalog': screenCatalog, 'personality-detail': screenPersonalityDetail,
  'order-form': screenOrderForm, 'order-status': screenOrderStatus, 'order-delivered': screenOrderDelivered,
  'hall': screenHall, 'hall-detail': screenHallDetail, 'corporate': screenCorporate,
};

function renderChrome() {
  document.getElementById('titleSub').textContent = t('title_sub');
  document.getElementById('resetBtn').textContent = t('reset_btn');
  document.getElementById('backLink').textContent = t('back');
  document.getElementById('themeLabel').textContent = document.body.classList.contains('light') ? t('theme_light') : t('theme_dark');
  document.getElementById('bannerBox').innerHTML = '<b>' + t('banner_tag') + '</b> — ' + t('banner_text');
  document.getElementById('langsel').innerHTML = LANGS.map(function(l) {
    return '<button class="' + (lang===l.code?'active':'') + '" data-l="' + l.code + '">' + l.label + '</button>';
  }).join('');
  var btns = document.querySelectorAll('.langsel button');
  for (var i=0;i<btns.length;i++) {
    btns[i].addEventListener('click', function() { lang = this.dataset.l; render(); });
  }
}

function render() {
  var fn = SCREENS[nav.screen] || screenHome;
  document.getElementById('phone').innerHTML = '<div class="notch"></div>' + fn();
  renderChrome();
}

document.getElementById('themeToggle').addEventListener('click', function() {
  document.body.classList.toggle('light');
  render();
});
document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm(t('reset_confirm'))) {
    state = defaultState();
    saveState();
    draft = {};
    navigateTo('home');
  }
});

render();
</script>

</body>
</html>
